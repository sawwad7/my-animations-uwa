<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Anatsui — Breaking Quote</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; }
  .quote-container { background-color: #0a0a0a; padding: 40px; font-family: 'Georgia', serif; color: #d1d1d1; max-width: 800px; margin: auto; }
  .art-quote { border-left: 3px solid #8e6e3e; margin: 0; padding: 10px 0 10px 30px; }
  .art-quote p { font-size: 1.25rem; font-style: italic; line-height: 1.6; margin-bottom: 15px; letter-spacing: 0.02em; }
  .art-quote cite { display: block; font-style: normal; font-size: 0.9rem; color: #a0a0a0; text-transform: uppercase; letter-spacing: 0.1em; }
</style>
</head>
<body>
<div class="quote-container">
  <blockquote class="art-quote">
    <p>"Breaking is not destruction but a necessity for reforming."</p>
    <cite>— El Anatsui</cite>
  </blockquote>
</div>
</body>
</html>
